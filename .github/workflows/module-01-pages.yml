name: Publish Module 1 interactive deck

on:
  push:
    branches: [main]
    paths:
      - "slides/module-01/**"
      - ".github/workflows/module-01-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload interactive deck
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides/module-01

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
